<!DOCTYPE html>
<!-- Defines HTML5 document -->

<html lang="en">

<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Makes webpage responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS CDN -->
    <!-- Used for responsive layout and ready-made classes -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Bootstrap Icons CDN -->
    <!-- Used to display icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- External CSS Connection -->
    <!-- Connects style.css file -->
    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <!-- container-fluid gives full width responsive layout -->
    <div class="container-fluid">

        <!-- row is used for Bootstrap grid system -->
        <div class="row">

            <!-- Sidebar Starts -->
            <!-- col-md-2 means sidebar takes 2 columns -->
            <div class="col-md-2 sidebar">

                <!-- Dashboard heading -->
                <h3 class="text-center mb-4">Dashboard</h3>

                <!-- Sidebar menu links -->
                <a href="#">
                    <i class="bi bi-house"></i> Home
                </a>

                <a href="#">
                    <i class="bi bi-people"></i> Students
                </a>

                <a href="#">
                    <i class="bi bi-book"></i> Courses
                </a>

                <a href="#">
                    <i class="bi bi-file-earmark"></i> Exams
                </a>

                <a href="#">
                    <i class="bi bi-gear"></i> Settings
                </a>

            </div>
            <!-- Sidebar Ends -->



            <!-- Main Content Starts -->
            <!-- col-md-10 means main content takes 10 columns -->
            <div class="col-md-10 p-4">

                <!-- Top Navbar Section -->
                <div class="d-flex justify-content-between align-items-center mb-4">

                    <!-- Dashboard title -->
                    <h2>College Admin Dashboard</h2>

                    <!-- Bootstrap button -->
                    <button class="btn btn-primary">Login</button>

                </div>



                <!-- Statistics Cards Section -->
                <div class="row g-4">

                    <!-- Card 1 -->
                    <div class="col-md-3 col-sm-6">

                        <!-- card-box is custom CSS class -->
                        <!-- bg1 gives background color -->
                        <div class="card-box bg1">

                            <h4>1200</h4>
                            <p>Total Students</p>

                        </div>

                    </div>



                    <!-- Card 2 -->
                    <div class="col-md-3 col-sm-6">

                        <div class="card-box bg2">

                            <h4>75</h4>
                            <p>Total Faculty</p>

                        </div>

                    </div>



                    <!-- Card 3 -->
                    <div class="col-md-3 col-sm-6">

                        <div class="card-box bg3">

                            <h4>25</h4>
                            <p>Departments</p>

                        </div>

                    </div>



                    <!-- Card 4 -->
                    <div class="col-md-3 col-sm-6">

                        <div class="card-box bg4">

                            <h4>300</h4>
                            <p>Exams Conducted</p>

                        </div>

                    </div>

                </div>
                <!-- Cards End -->



                <!-- Table Section -->
                <div class="mt-5">

                    <h4>Recent Students</h4>

                    <!-- Bootstrap table -->
                    <table class="table table-bordered table-striped mt-3">

                        <!-- Table heading -->
                        <thead class="table-dark">

                            <tr>

                                <th>ID</th>
                                <th>Name</th>
                                <th>Course</th>
                                <th>Status</th>

                            </tr>

                        </thead>

                        <!-- Table body -->
                        <tbody>

                            <tr>
                                <td>101</td>
                                <td>Pritesh</td>
                                <td>BCA</td>
                                <td>Active</td>
                            </tr>

                            <tr>
                                <td>102</td>
                                <td>Aditya</td>
                                <td>MCA</td>
                                <td>Active</td>
                            </tr>

                            <tr>
                                <td>103</td>
                                <td>Rohit</td>
                                <td>BTech</td>
                                <td>Inactive</td>
                            </tr>

                        </tbody>

                    </table>

                </div>
                <!-- Table Ends -->

            </div>
            <!-- Main Content Ends -->

        </div>

    </div>

</body>
</html>
