<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Dashboard</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#212529;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
}

button{
    background:blue;
    color:white;
    border:none;
    padding:10px 15px;
}
</style>
</head>

<body>

<header>
    <h1>Shop Dashboard</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Total Orders : 150</h2>
        <button>View</button>
    </div>

    <div class="card">
        <h2>Total Products : 75</h2>
        <button>View</button>
    </div>

    <div class="card">
        <h2>Total Revenue : $5000</h2>
        <button>View</button>
    </div>

</div>

</body>
</html>
